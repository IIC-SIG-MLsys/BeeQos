apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-iperf3-client-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ingress-iperf3-client
  template:
    metadata:
      annotations:
        sidecar.istio.io/proxyImage: "istio/proxyv2:1.15.3"
        status.sidecar.istio.io/port: "0"
        proxy.istio.io/config: "{concurrency: 48}"
        sidecar.istio.io/proxyCPU: "1m"
        sidecar.istio.io/proxyiMemory: "1Mi"
      labels:
        app: ingress-iperf3-client
        #      annotations:
        #        oncn-bwm.openeuler.org/egress-bandwidth: '{"request":"600Mb","limit":"800Mb","priority":"1"}'
        #        oncn-bwm.openeuler.org/ingress-bandwidth: '{"request":"600Mb","limit":"800Mb","priority":"1"}'
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-node-01
        #kubernetes.io/hostname: localhost.localdomain
      containers:
        - name: ingress-iperf3-client
          image: docker.io/networkstatic/iperf3
          imagePullPolicy: IfNotPresent
          command: ["iperf3", "-s"]
          ports:
            - containerPort: 5001
          resources:
            #limits:
            #cpu: 100m
            #memory: 32Mi
            requests:
              cpu: 500m
              memory: 128Mi

